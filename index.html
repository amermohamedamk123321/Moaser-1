<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <!-- Title and Basic Meta Tags -->

    <meta name="description" content="Moaser Dental - A professional specialized dental hospital offering advanced dental care with modern technology and expert specialists. Treatments close to international standards in Kabul, Afghanistan." />

    <meta name="author" content="Moaser Dental Hospital" />
    <meta name="theme-color" content="#0066cc" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://moaserdental.com" />
    <meta property="og:title" content="Moaser Dental - Professional Dental Hospital" />
    <meta property="og:description" content="Advanced dental care with modern technology and specialist collaboration. Delivering treatments close to international standards." />

    <meta property="og:image:alt" content="Moaser Dental Logo" />
    <meta property="og:site_name" content="Moaser Dental" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://moaserdental.com" />
    <meta name="twitter:title" content="Moaser Dental - Professional Dental Hospital" />
    <meta name="twitter:description" content="Advanced dental care with modern technology and specialist collaboration." />
    <meta name="twitter:image" content="https://moaserdental.com/favicon.png" />
    <meta name="twitter:creator" content="@moaserdental" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://moaserdental.com" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Additional SEO Meta Tags -->
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="distribution" content="global" />

      "description": "Professional specialized dental hospital offering advanced dental care with modern technology",

      "telephone": "+93-XXX-XXX-XXXX",
      "areaServed": {
        "@type": "City",
        "name": "Kabul",
        "addressCountry": "AF"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "Afghanistan",
        "addressLocality": "Kabul"
      },
      "image": "https://moaserdental.com/favicon.png",
      "priceRange": "$$",
      "medicalSpecialty": [
        "Dentistry",
        "Orthodontics",
        "Periodontics",
        "Prosthodontics",

      ],
      "knowsAbout": [
        "Dental implants",
        "Cosmetic dentistry",
        "Root canal treatment",
        "Teeth whitening",

      ],

        "https://www.instagram.com/moaserdental",
        "https://www.linkedin.com/company/moaserdental"
      ]
    }
